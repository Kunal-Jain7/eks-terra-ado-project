# helm/eksplat-app/values.yaml
# Default values — overridden per environment in the pipeline via --set or -f flags.

replicaCount: 3

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "eksplat-app"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  hosts:
  - host: "" # empty = match all hosts (for dev/testing)
    paths:
    - path: /
      pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Readiness probe — gates traffic admission
readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1

# Liveness probe — restarts unhealthy containers
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# PodDisruptionBudget — critical for zero-downtime upgrades
pdb:
  enabled: true
  minAvailable: 2 # at least 2 pods always available during node drain

# Spread pods across AZs and nodes for HA
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: DoNotSchedule
  labelSelector:
    matchLabels:
      app: eksplat-app
- maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
  labelSelector:
    matchLabels:
      app: eksplat-app

# Pod anti-affinity — prefer different nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - eksplat-app
        topologyKey: kubernetes.io/hostname

# Graceful termination — allows in-flight requests to complete
terminationGracePeriodSeconds: 30

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/"

podLabels:
  app: eksplat-app
  version: "1.0.0"

nodeSelector: {}
tolerations: []

# Custom nginx config served as index.html — confirms app identity
configMap:
  enabled: true
  content: |
    <!DOCTYPE html>
    <html>
    <head><title>EKS Platform — Sample App</title></head>
    <body>
      <h1>EKS Platform is running</h1>
      <p>Environment: DEV</p>
      <p>Cluster: eksplat-dev-eks</p>
      <p>Version: 1.0.0</p>
    </body>
    </html>
