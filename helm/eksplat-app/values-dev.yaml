replicaCount: 3

configMap:
  enabled: true
  content: |
    <!DOCTYPE html>
    <html>
    <head><title>EKS Platform — Sample App (DEV)</title></head>
    <body>
      <h1>EKS Platform is running</h1>
      <p>Environment: DEV</p>
      <p>Cluster: eksplat-dev-eks</p>
    </body>
    </html>

ingress:
  enabled: true
  className: "nginx"
  hosts:
  - host: ""
    paths:
    - path: /
      pathType: Prefix

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2
